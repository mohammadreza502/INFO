<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Mohammadreza Hedayati · Network Engineer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Personal page of Mohammadreza Hedayati - ICT & Computer Networks.">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/471/471664.png" type="image/png">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            background: #08070f;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ---------- CANVAS (Network Topology) ---------- */
        #network-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        /* ---------- FLOATING BINARY STREAM ---------- */
        .binary-stream {
            position: fixed;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: rgba(0, 255, 200, 0.06);
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
            white-space: nowrap;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ---------- MAIN CARD ---------- */
        .card-container {
            position: relative;
            z-index: 2;
            background: rgba(12, 14, 30, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 2.5rem 2rem 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow:
                0 30px 80px -15px rgba(0, 0, 0, 0.9),
                inset 0 1px 1px rgba(255, 255, 255, 0.06),
                0 0 0 1px rgba(0, 255, 200, 0.10);
            border: 1px solid rgba(0, 255, 200, 0.06);
            transition: all 0.4s ease;
            text-align: center;
            margin: 20px 0;
        }

        /* subtle glow ring */
        .card-container::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 42px;
            background: conic-gradient(from 0deg,
                    transparent,
                    rgba(0, 255, 200, 0.10),
                    rgba(0, 150, 255, 0.10),
                    transparent);
            z-index: -1;
            animation: spinGlow 10s linear infinite;
            opacity: 0.4;
            filter: blur(8px);
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ---------- BADGE ---------- */
        .info-label {
            position: absolute;
            top: 16px;
            left: 20px;
            background: linear-gradient(135deg, #00e5b0, #00b8d4);
            color: #08070f;
            font-weight: 700;
            font-size: clamp(0.5rem, 1.2vw, 0.65rem);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(0, 230, 180, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.10);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ---------- AVATAR + RADAR (ظریف‌تر) ---------- */
        .avatar-wrapper {
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }

        .avatar-wrapper .radar-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 30%, rgba(0, 255, 200, 0.02) 70%, transparent 100%);
            z-index: 0;
            overflow: hidden;
        }

        .avatar-wrapper .radar-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 200, 0.15), transparent);
            transform-origin: center center;
            animation: radarSweep 4s linear infinite;
            border-radius: 50% 50% 0 0;
            transform: translate(-50%, -50%) rotate(0deg);
        }

        @keyframes radarSweep {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .round {
            width: clamp(90px, 20vw, 130px);
            height: clamp(90px, 20vw, 130px);
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 200, 0.4);
            padding: 4px;
            background: #0d0c1a;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.10);
            transition: 0.3s;
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        .round:hover {
            transform: scale(1.02);
            border-color: #00e5b0;
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.2);
        }

        /* ---------- NAME ---------- */
        h3 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            margin: 18px 0 4px;
            background: linear-gradient(to right, #f0f9ff, #80d0ff, #b0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 40px rgba(0, 150, 255, 0.10);
        }

        /* ---------- TITLE (ICT & Networks) ---------- */
        .title {
            font-size: clamp(0.75rem, 2vw, 0.95rem);
            font-weight: 300;
            letter-spacing: 1.5px;
            color: #80a0c0;
            margin: 6px 0 2px;
            padding: 6px 20px;
            display: inline-block;
            border-top: 1px solid rgba(0, 255, 200, 0.10);
            border-bottom: 1px solid rgba(0, 255, 200, 0.10);
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.15);
        }

        .title strong {
            color: #b8e0ff;
            font-weight: 600;
        }

        .title i {
            color: #00e5b0;
            margin: 0 6px;
        }

        /* ---------- LOCATION ---------- */
        .location-sub {
            font-size: clamp(0.7rem, 1.6vw, 0.8rem);
            color: #6090a8;
            margin: 6px 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 300;
            letter-spacing: 0.5px;
            flex-wrap: wrap;
        }

        .location-sub i {
            color: #00e5b0;
            font-size: 0.8rem;
        }

        .location-sub .flag {
            width: clamp(16px, 3vw, 20px);
            height: auto;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* ---------- SOCIAL ICONS ---------- */
        .social-icons {
            margin: 16px 0 14px;
            display: flex;
            justify-content: center;
            gap: clamp(12px, 2.5vw, 18px);
            flex-wrap: wrap;
        }

        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(44px, 9vw, 52px);
            height: clamp(44px, 9vw, 52px);
            background: rgba(0, 255, 200, 0.04);
            border-radius: 50%;
            color: #b0c8e0;
            font-size: clamp(1.1rem, 2.2vw, 1.3rem);
            border: 1px solid rgba(0, 255, 200, 0.08);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: rgba(0, 255, 200, 0.12);
            color: #00e5b0;
            border-color: #00e5b0;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.10);
        }

        /* ---------- NETWORK STATS (فشرده و مرتب) ---------- */
        .network-stats {
            display: flex;
            justify-content: center;
            gap: clamp(12px, 3vw, 24px);
            margin: 10px 0 6px;
            flex-wrap: wrap;
        }

        .network-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 1.4vw, 0.75rem);
            color: #80a8c0;
        }

        .network-stats .stat-item i {
            color: #00e5b0;
            font-size: 0.7rem;
            width: 1.2em;
        }

        .network-stats .stat-item .value {
            font-weight: 600;
            color: #b0d8e8;
        }

        /* ---------- SKILLS (تگ‌های کوچک) ---------- */
        .skills {
            margin-top: 18px;
            padding: 16px 14px 12px;
            background: rgba(0, 0, 0, 0.20);
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 200, 0.04);
        }

        .skills h6 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.55rem, 1.4vw, 0.65rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #50b8c8;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .skills ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 10px;
            padding: 0;
        }

        .skills ul li {
            background: rgba(0, 200, 180, 0.05);
            border: 1px solid rgba(0, 255, 200, 0.06);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: clamp(0.55rem, 1.2vw, 0.7rem);
            font-weight: 500;
            color: #b0d0e8;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        .skills ul li:hover {
            background: rgba(0, 255, 200, 0.08);
            border-color: #00e5b0;
            color: #e0f5ff;
            transform: scale(1.02);
        }

        /* ---------- FOOTER ---------- */
        footer {
            margin-top: clamp(1.5rem, 4vh, 2.5rem);
            text-align: center;
            font-size: clamp(0.6rem, 1.4vw, 0.7rem);
            color: #405570;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
            border-top: 1px solid rgba(0, 255, 200, 0.04);
            padding-top: clamp(1rem, 2.5vh, 1.4rem);
            width: 100%;
            max-width: 480px;
        }

        footer p {
            margin: 0;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .card-container {
                padding: 1.8rem 1.2rem 1.5rem;
                border-radius: 32px;
            }
            .info-label {
                top: 12px;
                left: 12px;
                padding: 3px 10px;
                font-size: 0.5rem;
            }
            .network-stats {
                gap: 10px;
            }
        }

        @media (max-width: 380px) {
            .card-container {
                padding: 1.4rem 0.8rem 1.2rem;
            }
            .social-icons a {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .card-container {
                max-width: 460px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .card-container {
                padding: 1rem 1.5rem 0.8rem;
                max-width: 420px;
            }
            .round {
                width: 70px;
                height: 70px;
            }
            h3 {
                font-size: 1.2rem;
                margin: 10px 0 2px;
            }
            .social-icons {
                margin: 10px 0 6px;
                gap: 8px;
            }
            .social-icons a {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }
            .skills {
                margin-top: 10px;
                padding: 10px 10px 8px;
            }
            .skills ul {
                gap: 4px 8px;
            }
            .skills ul li {
                padding: 3px 10px;
                font-size: 0.5rem;
            }
            .network-stats {
                gap: 8px;
                margin: 4px 0;
            }
            .info-label {
                top: 8px;
                left: 10px;
                padding: 2px 8px;
                font-size: 0.4rem;
            }
            footer {
                margin-top: 0.8rem;
                padding-top: 0.6rem;
            }
            .location-sub {
                margin: 2px 0 6px;
                font-size: 0.6rem;
            }
            .title {
                padding: 4px 12px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== CANVAS ====== -->
    <canvas id="network-canvas"></canvas>

    <!-- ====== BINARY STREAMS (JS) ====== -->

    <!-- ====== MAIN CARD ====== -->
    <main style="width:100%; display:flex; justify-content:center; align-items:center; flex:1; position:relative; z-index:1;">
        <div class="card-container">

            <span class="info-label">
                <i class="fas fa-network-wired"></i> ICT Engineer
            </span>

            <!-- Avatar -->
            <div class="avatar-wrapper">
                <div class="radar-ring"></div>
                <img class="round" src="https://i.postimg.cc/zf25NbRV/Picsart-25-10-16-20-46-18-568.jpg" alt="Mohammadreza Hedayati" />
            </div>

            <h3>Mohammadreza Hedayati</h3>

            <!-- Title -->
            <div class="title">
                <i class="fas fa-server"></i> <strong>ICT</strong> &amp; <strong>Networks</strong> <i class="fas fa-wifi"></i>
            </div>

            <!-- Location -->
            <div class="location-sub">
                <i class="fas fa-map-pin"></i> Tehran, Iran
                <img class="flag" src="https://flagcdn.com/w20/ir.png" srcset="https://flagcdn.com/w40/ir.png 2x" alt="Iran flag">
            </div>

            <!-- Social Icons -->
            <div class="social-icons">
                <a href="https://instagram.com/mohammadreza.502" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://x.com/Mohammadreza502" target="_blank" rel="noopener noreferrer" aria-label="X">

                </a>
                <a href="tel:+989999928691" aria-label="Phone">
                    <i class="fas fa-phone"></i>
                </a>
                <a href="https://linkedin.com/in/mohammadreza502" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>

            <!-- Network Stats (فشرده) -->
            <div class="network-stats">
                <span class="stat-item"><i class="fas fa-clock"></i> <span class="value">42d</span> uptime</span>

        </div>

    <!-- ====== FOOTER ====== -->
    <footer>
        <p>© 2026 · Mohammadreza Hedayati</p>
    </footer>

    <script>
        // ============================================================
        //  NETWORK TOPOLOGY (Canvas)
        // ============================================================
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let nodes = [];
        let packets = [];
        let animationId = null;

        const NODE_COUNT = 26;
        const EDGE_DIST = 150;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initNodes();
        }

        function initNodes() {
            nodes = [];
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    radius: 2 + Math.random() * 2.5
                });
            }
            packets = [];
            for (let i = 0; i < 10; i++) {
                spawnPacket(true);
            }
        }

        function spawnPacket(random = true) {
            if (nodes.length < 2) return;
            let fromIdx, toIdx;
            if (random) {
                fromIdx = Math.floor(Math.random() * nodes.length);
                toIdx = Math.floor(Math.random() * nodes.length);
                while (toIdx === fromIdx) {
                    toIdx = Math.floor(Math.random() * nodes.length);
                }
            } else {
                fromIdx = Math.floor(Math.random() * nodes.length);
                toIdx = Math.floor(Math.random() * nodes.length);
                while (toIdx === fromIdx) {
                    toIdx = Math.floor(Math.random() * nodes.length);
                }
            }
            packets.push({
                from: fromIdx,
                to: toIdx,
                progress: Math.random(),
                speed: 0.005 + Math.random() * 0.012,
                radius: 2 + Math.random() * 2
            });
        }

        function updateNodes() {
            for (let node of nodes) {
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                node.x = Math.max(0, Math.min(width, node.x));
                node.y = Math.max(0, Math.min(height, node.y));
            }
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, width, height);

            // Edges
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < EDGE_DIST) {
                        const alpha = 0.12 * (1 - dist / EDGE_DIST);
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(0, 229, 176, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }

            // Nodes
            for (let node of nodes) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00e5b0';
                ctx.shadowColor = '#00e5b0';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Packets
            const newPackets = [];
            for (let pkt of packets) {
                const fromNode = nodes[pkt.from];
                const toNode = nodes[pkt.to];
                if (!fromNode || !toNode) {
                    spawnPacket(true);
                    continue;
                }

                pkt.progress += pkt.speed;
                if (pkt.progress >= 1) {
                    spawnPacket(true);
                    continue;
                }

                const x = fromNode.x + (toNode.x - fromNode.x) * pkt.progress;
                const y = fromNode.y + (toNode.y - fromNode.y) * pkt.progress;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 10);
                gradient.addColorStop(0, 'rgba(0, 255, 200, 0.8)');
                gradient.addColorStop(0.3, 'rgba(0, 229, 176, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 229, 176, 0)');
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(x, y, pkt.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#00e5b0';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;

                newPackets.push(pkt);
            }
            packets = newPackets;

            while (packets.length < 8) {
                spawnPacket(true);
            }
        }

        function animateNetwork() {
            updateNodes();
            drawNetwork();
            animationId = requestAnimationFrame(animateNetwork);
        }

        // ============================================================
        //  BINARY STREAMS
        // ============================================================
        function createBinaryStreams() {
            const container = document.body;
            const chars = '01';
            for (let i = 0; i < 14; i++) {
                const span = document.createElement('span');
                span.className = 'binary-stream';
                let text = '';
                for (let j = 0; j < 6 + Math.floor(Math.random() * 8); j++) {
                    text += chars[Math.floor(Math.random() * chars.length)];
                }
                span.textContent = text;
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (10 + Math.random() * 16) + 'px';
                span.style.animationDuration = (15 + Math.random() * 25) + 's';
                span.style.animationDelay = (Math.random() * 15) + 's';
                span.style.opacity = 0.04 + Math.random() * 0.06;
                container.appendChild(span);
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        window.addEventListener('resize', resize);
        resize();
        animateNetwork();
        createBinaryStreams();

        canvas.addEventListener('click', () => {
            for (let i = 0; i < 4; i++) {
                setTimeout(() => spawnPacket(true), i * 60);
            }
        });
    </script>
</body>
