<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>about</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<style>
		@import url('https://fonts.googleapis.com/css?family=Montserrat');

		* {
			box-sizing: border-box;
		}

		body {
			background-color: #28223F;
			font-family: Montserrat, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			min-height: 100vh;
			margin: 0;
		}

		h3 {
			margin: 10px 0;
		}

		h6 {
			margin: 5px 0;
			text-transform: uppercase;
		}

		p {
			font-size: 14px;
			line-height: 21px;
		}

		.card-container {
			background-color: #231E39;
			border-radius: 5px;
			box-shadow: 0px 10px 20px -10px rgba(0,0,0,0.75);
			color: #B3B8CD;
			padding-top: 30px;
			position: relative;
			width: 350px;
			max-width: 100%;
			text-align: center;
		}

		.card-container .info-label {
			color: #231E39;
			background-color: #FEBB0B;
			border-radius: 3px;
			font-size: 14px;
			font-weight: bold;
			padding: 3px 7px;
			position: absolute;
			top: 30px;
			left: 13px; /* حرکت بیشتر به سمت چپ */
		}

		.card-container .round {
			border: 1px solid #03BFCB;
			border-radius: 50%;
			padding: 7px;
		}

		.social-icons {
			margin-top: 20px;
		}

		.social-icons a {
			display: inline-block;
			width: 35px;
			height: 35px;
			margin: 0 5px;
			background-color: #03BFCB;
			color: #231E39;
			border-radius: 50%;
			text-align: center;
			line-height: 35px;
			font-size: 16px;
			transition: background-color 0.3s, color 0.3s;
		}

		.social-icons a:hover {
			background-color: #02899C;
			color: white;
		}

		.skills {
			background-color: #1F1A36;
			text-align: left;
			padding: 15px;
			margin-top: 30px;
		}

		.skills ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
		}

		.skills ul li {
			border: 1px solid #2D2747;
			border-radius: 2px;
			display: inline-block;
			font-size: 12px;
			margin: 0 7px 7px 0;
			padding: 7px;
		}

		footer {
			background-color: #222;
			color: #fff;
			font-size: 14px;
			bottom: 0;
			position: fixed;
			left: 0;
			right: 0;
			text-align: center;
			z-index: 999;
		}

		footer p {
			margin: 10px 0;
		}

		footer i {
			color: red;
		}

		footer a {
			color: #3c97bf;
			text-decoration: none;
		}
	</style>
</head>
<body>

<div class="card-container">
	<span class="info-label">Information</span>
	<img class="round" src="https://i.postimg.cc/vmQz3Dpj/photo-2025-05-02-02-56-39.jpg" alt="user" />
	<h3>Mohammadreza Hedayati</h3>
	<h6>Tehran,Iran</h6>
	<p>ICT and <br/> Computer Networks</p>

	<div class="social-icons">
		<a href="https://instagram.com/mohammadreza.502" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
		<a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>
		<a href="https://github.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>
		<a href="https://linkedin.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin-in"></i></a>
	</div>

	<div class="skills">
		<h6></h6>
		<ul>
			<li>UI / UX</li>
			<li>Front End Development</li>
			<li>HTML</li>
			<li>CSS</li>
			<li>JavaScript</li>
			<li>React</li>
			<li>Node</li>
		</ul>
	</div>
</div>

<footer>
	<p>&copy; Mohammadreza502</p>
</footer>

</body>
</html>
