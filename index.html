        * {

            padding: 0;

            left: 0;

            height: 100%;

            pointer-events: none;
            display: block;

        /* ---------- FLOATING BINARY STREAM ---------- */

            position: fixed;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: rgba(0, 255, 200, 0.08);
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
            white-space: nowrap;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ---------- MAIN CARD ---------- */
        .card-container {
            position: relative;
            z-index: 2;
            background: rgba(12, 14, 30, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 2.8rem 2.8rem 2.2rem;
            max-width: 540px;
            width: 100%;
            box-shadow:
                0 30px 80px -15px rgba(0, 0, 0, 0.9),
                inset 0 1px 1px rgba(255, 255, 255, 0.06),
                0 0 0 1px rgba(0, 255, 200, 0.12);
            border: 1px solid rgba(0, 255, 200, 0.08);
            transition: all 0.4s ease;
            text-align: center;
            margin: 20px 0;
        }

        .card-container::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50px;
            background: conic-gradient(from 0deg,
                    transparent,
                    rgba(0, 255, 200, 0.15),
                    rgba(0, 150, 255, 0.2),
                    rgba(200, 0, 255, 0.10),
                    transparent,
                    rgba(0, 255, 200, 0.15),
                    transparent);
            z-index: -1;
            animation: spinGlow 8s linear infinite;
            opacity: 0.6;
            filter: blur(10px);
        }

        .card-container::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 48px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.08), rgba(0, 150, 255, 0.04), rgba(200, 0, 255, 0.06));
            z-index: -1;
            filter: blur(6px);
            opacity: 0.6;
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ---------- BADGE ---------- */
        .info-label {
            position: absolute;
            top: 20px;

            background: linear-gradient(135deg, #00e5b0, #00b8d4);
            color: #08070f;

            gap: 6px;

        /* ---------- AVATAR + RADAR ---------- */
        .avatar-wrapper {

        .avatar-wrapper .radar-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 30%, rgba(0, 255, 200, 0.03) 70%, transparent 100%);
            z-index: 0;
            overflow: hidden;
        }

        .avatar-wrapper .radar-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 200, 0.25), transparent);
            transform-origin: center center;
            animation: radarSweep 3s linear infinite;
            border-radius: 50% 50% 0 0;
            transform: translate(-50%, -50%) rotate(0deg);
        }

        .avatar-wrapper .ping-ring {

    <script>
        // ============================================================
        //  NETWORK TOPOLOGY (Canvas)
        // ============================================================
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let nodes = [];
        let packets = [];
        let animationId = null;

        const NODE_COUNT = 28;
        const EDGE_DIST = 160;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initNodes();
        }

        function initNodes() {
            nodes = [];
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: 2 + Math.random() * 3
                });
            }
            packets = [];
            for (let i = 0; i < 12; i++) {
                spawnPacket(true);
            }
        }

        function spawnPacket(random = true) {
            if (nodes.length < 2) return;
            let fromIdx, toIdx;
            if (random) {
                fromIdx = Math.floor(Math.random() * nodes.length);
                toIdx = Math.floor(Math.random() * nodes.length);
                while (toIdx === fromIdx) {
                    toIdx = Math.floor(Math.random() * nodes.length);
                }
            } else {
                fromIdx = Math.floor(Math.random() * nodes.length);
                toIdx = Math.floor(Math.random() * nodes.length);
                while (toIdx === fromIdx) {
                    toIdx = Math.floor(Math.random() * nodes.length);
                }
            }
            packets.push({
                from: fromIdx,
                to: toIdx,
                progress: Math.random(),
                speed: 0.005 + Math.random() * 0.015,
                radius: 2 + Math.random() * 3
            });
        }

        function updateNodes() {
            for (let node of nodes) {
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                node.x = Math.max(0, Math.min(width, node.x));
                node.y = Math.max(0, Math.min(height, node.y));
            }
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, width, height);

            // Edges
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < EDGE_DIST) {
                        const alpha = 0.15 * (1 - dist / EDGE_DIST);
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(0, 229, 176, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }

            // Nodes
            for (let node of nodes) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00e5b0';
                ctx.shadowColor = '#00e5b0';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Packets
            const newPackets = [];
            for (let pkt of packets) {
                const fromNode = nodes[pkt.from];
                const toNode = nodes[pkt.to];
                if (!fromNode || !toNode) {
                    spawnPacket(true);
                    continue;
                }

                pkt.progress += pkt.speed;
                if (pkt.progress >= 1) {
                    spawnPacket(true);
                    continue;
                }

                const x = fromNode.x + (toNode.x - fromNode.x) * pkt.progress;
                const y = fromNode.y + (toNode.y - fromNode.y) * pkt.progress;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 12);
                gradient.addColorStop(0, 'rgba(0, 255, 200, 0.9)');
                gradient.addColorStop(0.3, 'rgba(0, 229, 176, 0.4)');
                gradient.addColorStop(1, 'rgba(0, 229, 176, 0)');
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(x, y, pkt.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#00e5b0';
                ctx.shadowBlur = 25;
                ctx.fill();
                ctx.shadowBlur = 0;

                newPackets.push(pkt);
            }
            packets = newPackets;

            while (packets.length < 10) {
                spawnPacket(true);
            }
        }

        function animateNetwork() {
            updateNodes();
            drawNetwork();
            animationId = requestAnimationFrame(animateNetwork);
        }

        // ============================================================
        //  BINARY STREAMS
        // ============================================================
        function createBinaryStreams() {
            const container = document.body;
            const chars = '01';
            for (let i = 0; i < 18; i++) {
                const span = document.createElement('span');
                span.className = 'binary-stream';
                let text = '';
                for (let j = 0; j < 6 + Math.floor(Math.random() * 8); j++) {
                    text += chars[Math.floor(Math.random() * chars.length)];
                }
                span.textContent = text;
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (10 + Math.random() * 18) + 'px';
                span.style.animationDuration = (15 + Math.random() * 25) + 's';
                span.style.animationDelay = (Math.random() * 15) + 's';
                span.style.opacity = 0.05 + Math.random() * 0.08;
                container.appendChild(span);
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        window.addEventListener('resize', resize);
        resize();
        animateNetwork();
        createBinaryStreams();

        canvas.addEventListener('click', () => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => spawnPacket(true), i * 50);
            }
        });
    </script>
</body>
</html>
